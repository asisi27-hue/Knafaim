<!DOCTYPE html>
<html dir="rtl" lang="he" id="html-root">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<meta name="theme-color" content="#2563EB"/>
<meta name="description" content="מדריך מקיף לשירותים לאנשים עם צרכים מיוחדים"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="כנפיים"/>
<link rel="manifest" href="./manifest.json"/>
<link rel="apple-touch-icon" href="./icon-192.png"/>
<title>💙 כנפיים – מדריך שירותים לצרכים מיוחדים</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --blue:#2563EB;--teal:#0EA5E9;--green:#10B981;--orange:#F59E0B;
  --pink:#EC4899;--purple:#8B5CF6;--red:#EF4444;--warm:#F97316;
  --bg:#F0F7FF;--card:#FFF;--text:#1E293B;--muted:#64748B;--border:#E2EAF4;
  --radius:22px;--font:'Heebo',sans-serif;--fs:16px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html{font-size:var(--fs);}
body{font-family:var(--font);background:var(--bg);color:var(--text);direction:var(--dir,rtl);min-height:100vh;}
a{text-decoration:none;color:inherit;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-thumb{background:rgba(0,0,0,.15);border-radius:4px;}
body.hc{--bg:#000;--card:#111;--text:#fff;--muted:#ccc;--border:#555;}
body.hc .hdr{background:#000;border-bottom:2px solid #fff;}
body.hc .card{border-color:#555;}

.hdr{background:linear-gradient(135deg,#1E3A8A 0%,#2563EB 55%,#0EA5E9 100%);padding:10px 14px;position:sticky;top:0;z-index:200;box-shadow:0 4px 24px rgba(30,58,138,.3);}
.hdr-row{display:flex;align-items:center;gap:10px;}
.logo-wrap{display:flex;align-items:center;gap:8px;cursor:pointer;-webkit-tap-highlight-color:rgba(255,255,255,.2);padding:6px;border-radius:12px;flex-shrink:0;}
.logo-box{width:40px;height:40px;border-radius:12px;background:rgba(255,255,255,.2);border:2px solid rgba(255,255,255,.35);display:flex;align-items:center;justify-content:center;font-size:22px;}
.logo-txt .t1{font-size:17px;font-weight:900;color:#fff;line-height:1;}
.logo-txt .t2{font-size:9px;color:rgba(255,255,255,.7);}
.srch-wrap{flex:1;position:relative;}
.srch-wrap input{width:100%;background:rgba(255,255,255,.18);border:2px solid rgba(255,255,255,.3);border-radius:50px;padding:9px 40px 9px 14px;color:#fff;font-size:15px;font-family:var(--font);outline:none;}
.srch-wrap input::placeholder{color:rgba(255,255,255,.6);}
.srch-ico{position:absolute;right:12px;top:50%;transform:translateY(-50%);font-size:18px;cursor:pointer;padding:4px;}
.hdr-actions{display:flex;align-items:center;gap:6px;flex-shrink:0;}
.lang-btn{background:rgba(255,255,255,.18);border:1.5px solid rgba(255,255,255,.35);color:#fff;border-radius:10px;padding:6px 10px;font-size:12px;font-weight:700;cursor:pointer;font-family:var(--font);}

#install-banner{display:none;background:linear-gradient(135deg,#1E3A8A,#2563EB);color:#fff;padding:10px 14px;flex-direction:row;align-items:center;justify-content:space-between;gap:10px;}
#install-banner p{font-size:13px;font-weight:600;flex:1;}
#install-btn{background:#fff;color:#1E3A8A;border:none;border-radius:20px;padding:7px 16px;font-weight:800;font-size:13px;cursor:pointer;font-family:var(--font);}

.fbar{background:var(--card);border-bottom:2px solid var(--border);position:sticky;top:62px;z-index:150;box-shadow:0 2px 14px rgba(0,0,0,.07);}
.fbar-in{display:flex;gap:7px;padding:8px 12px;overflow-x:auto;scrollbar-width:none;}
.fbar-in::-webkit-scrollbar{height:0;}
.fcat{display:flex;align-items:center;gap:5px;white-space:nowrap;border:2px solid var(--border);border-radius:50px;padding:7px 14px;font-size:13px;font-weight:700;cursor:pointer;font-family:var(--font);background:var(--bg);color:var(--muted);transition:all .2s;}
.fcat.on{color:#fff;border-color:transparent;box-shadow:0 4px 12px rgba(0,0,0,.18);transform:scale(1.04);}

.main{max-width:920px;margin:0 auto;padding:14px 12px 110px;}
.banner{background:linear-gradient(135deg,#FFFBEB,#FEF3C7);border:2px solid #F59E0B;border-radius:var(--radius);padding:12px 14px;margin-bottom:16px;display:flex;align-items:flex-start;gap:10px;}
.banner .bi{font-size:26px;flex-shrink:0;margin-top:2px;}
.banner .bt{font-size:13px;line-height:1.6;color:#92400E;}
.banner .bt b{display:block;font-size:14px;font-weight:800;margin-bottom:2px;}
.sec-ttl{font-size:17px;font-weight:800;color:var(--text);margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.count-badge{background:var(--blue);color:#fff;border-radius:20px;font-size:12px;padding:2px 10px;font-weight:700;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px;margin-bottom:26px;}

.card{background:var(--card);border-radius:var(--radius);border:2px solid var(--border);padding:0;cursor:pointer;box-shadow:0 2px 12px rgba(0,0,0,.06);transition:transform .2s cubic-bezier(.34,1.56,.64,1),box-shadow .2s;overflow:hidden;animation:cardIn .3s ease both;}
.card:hover{transform:translateY(-4px);box-shadow:0 12px 32px rgba(0,0,0,.12);}
.card:active{transform:scale(.97);}
.card-top-bar{height:5px;width:100%;}
.card-body{padding:14px;}
.card-head{display:flex;align-items:flex-start;gap:10px;margin-bottom:10px;}
.card-icon{width:52px;height:52px;border-radius:16px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:26px;}
.card-ti .cn{font-size:15px;font-weight:800;color:var(--text);line-height:1.2;margin-bottom:2px;}
.card-ti .co{font-size:11px;color:var(--muted);}
.card-ti .vbadge{display:inline-flex;align-items:center;gap:2px;font-size:10px;font-weight:700;color:#059669;background:#D1FAE5;border-radius:20px;padding:1px 6px;margin-top:2px;}
.card-tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px;}
.tag{font-size:11px;font-weight:700;padding:2px 9px;border-radius:20px;}
.tag-cat{color:#fff;}
.tag-plain{background:var(--bg);color:var(--muted);border:1px solid var(--border);}
.card-desc{font-size:12px;color:var(--muted);line-height:1.6;margin-bottom:10px;}
.card-loc{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--muted);margin-bottom:8px;}
.card-acts{display:flex;gap:5px;flex-wrap:wrap;}
.act-btn{display:flex;align-items:center;gap:4px;border:none;border-radius:10px;padding:6px 11px;font-size:11px;font-weight:700;cursor:pointer;font-family:var(--font);transition:all .15s;white-space:nowrap;}
.act-call{background:#DCFCE7;color:#16A34A;}.act-call:hover{background:#16A34A;color:#fff;}
.act-wa{background:#D1FAE5;color:#047857;}.act-wa:hover{background:#10B981;color:#fff;}
.act-map{background:#DBEAFE;color:#1D4ED8;}.act-map:hover{background:#1D4ED8;color:#fff;}
.act-web{background:#EDE9FE;color:#6D28D9;}.act-web:hover{background:#7C3AED;color:#fff;}
.act-save{background:var(--bg);color:var(--muted);border:1.5px solid var(--border);}
.act-save.on{background:#FEF9C3;color:#854D0E;border-color:#FDE68A;}

.gps-ov{position:fixed;inset:0;background:rgba(15,23,42,.75);backdrop-filter:blur(12px);z-index:700;display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeIn .2s;}
.gps-box{background:var(--card);border-radius:28px;padding:26px 20px 22px;max-width:320px;width:100%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.3);animation:popUp .3s cubic-bezier(.34,1.56,.64,1);}
.gps-icon{font-size:50px;margin-bottom:12px;display:block;}
.gps-box h3{font-size:19px;font-weight:900;color:var(--text);margin-bottom:7px;}
.gps-box .gps-p{font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:14px;}
.gps-svc{background:var(--bg);border-radius:12px;padding:9px 12px;font-size:13px;font-weight:800;color:var(--blue);margin-bottom:18px;border:2px solid var(--border);}
.gps-btns{display:flex;gap:8px;}
.gps-ok{flex:1;background:linear-gradient(135deg,#2563EB,#0EA5E9);color:#fff;border:none;border-radius:14px;padding:13px;font-size:14px;font-weight:800;cursor:pointer;font-family:var(--font);}
.gps-skip{flex:1;background:var(--bg);color:var(--muted);border:2px solid var(--border);border-radius:14px;padding:13px;font-size:13px;font-weight:700;cursor:pointer;font-family:var(--font);}
.gps-spin{width:40px;height:40px;border:4px solid #DBEAFE;border-top-color:#2563EB;border-radius:50%;margin:0 auto 14px;animation:spin 1s linear infinite;}

.ov{position:fixed;inset:0;background:rgba(15,23,42,.65);backdrop-filter:blur(10px);z-index:500;display:flex;align-items:flex-end;animation:fadeIn .2s;}
.modal{background:var(--card);border-radius:30px 30px 0 0;width:100%;max-height:90vh;overflow-y:auto;padding:0 0 40px;animation:slideUp .3s cubic-bezier(.34,1.56,.64,1);max-width:600px;margin:0 auto;}
.modal-bar{height:7px;border-radius:7px 7px 0 0;}
.modal-in{padding:18px 18px 0;}
.m-handle{width:44px;height:5px;background:#E2E8F0;border-radius:3px;margin:0 auto 16px;}
.m-head{display:flex;align-items:flex-start;gap:12px;margin-bottom:14px;}
.m-icon{width:64px;height:64px;border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:32px;flex-shrink:0;}
.m-title{font-size:20px;font-weight:900;line-height:1.2;margin-bottom:2px;}
.m-sub{font-size:12px;color:var(--muted);}
.m-sec{margin-bottom:14px;}
.m-sec h3{font-size:11px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px;}
.m-sec p{font-size:13px;line-height:1.7;color:var(--text);}
.info-row{display:flex;align-items:center;gap:9px;font-size:13px;padding:5px 0;border-bottom:1px solid var(--border);}
.info-row:last-child{border:none;}
.info-row .ii{font-size:18px;width:24px;text-align:center;}
.m-acts{display:flex;gap:8px;flex-wrap:wrap;margin-top:16px;padding:0 18px;}
.m-btn{flex:1;min-width:110px;border:none;border-radius:14px;padding:13px 8px;font-size:13px;font-weight:800;cursor:pointer;font-family:var(--font);display:flex;align-items:center;justify-content:center;gap:6px;}
.mb-primary{background:linear-gradient(135deg,#2563EB,#0EA5E9);color:#fff;}
.mb-wa{background:linear-gradient(135deg,#25D366,#128C7E);color:#fff;}
.mb-map{background:linear-gradient(135deg,#1D4ED8,#06B6D4);color:#fff;}
.mb-sec{background:var(--bg);color:var(--text);border:2px solid var(--border);}

.bnav{position:fixed;bottom:0;left:0;right:0;z-index:300;background:rgba(255,255,255,.96);backdrop-filter:blur(20px);border-top:2px solid var(--border);box-shadow:0 -4px 20px rgba(0,0,0,.09);display:flex;justify-content:space-around;padding:6px 0 env(safe-area-inset-bottom,10px);}
.nb{display:flex;flex-direction:column;align-items:center;gap:2px;background:none;border:none;cursor:pointer;padding:5px 12px;border-radius:14px;font-family:var(--font);}
.nb .ni{font-size:24px;filter:grayscale(50%) opacity(.55);}
.nb .nl{font-size:10px;color:#aaa;font-weight:700;}
.nb.on .ni{filter:none;}
.nb.on .nl{color:var(--blue);}
.nb-dot{width:5px;height:5px;border-radius:50%;background:var(--blue);margin-top:1px;}

.toast{position:fixed;top:18px;left:50%;transform:translateX(-50%);background:#1E293B;color:#fff;border-radius:50px;padding:11px 24px;font-size:13px;font-weight:700;box-shadow:0 8px 32px rgba(0,0,0,.3);z-index:9999;display:flex;align-items:center;gap:8px;animation:popIn .3s cubic-bezier(.34,1.56,.64,1);max-width:90vw;}

.empty{text-align:center;padding:50px 20px;color:var(--muted);}
.empty .ee{font-size:56px;margin-bottom:12px;}
.empty p{font-size:16px;font-weight:700;}
.about-card{background:var(--card);border-radius:var(--radius);border:2px solid var(--border);padding:20px;margin-bottom:12px;}
.about-card h3{font-size:15px;font-weight:800;margin-bottom:10px;}
.about-item{display:flex;gap:9px;align-items:flex-start;font-size:13px;padding:5px 0;line-height:1.5;}
.emer-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px;gap:8px;}
.emer-row:last-child{border:none;}
.emer-info{flex:1;min-width:0;}
.emer-info .lbl{font-weight:700;display:block;margin-bottom:2px;}
.emer-info .desc{font-size:11px;color:var(--muted);}
.emer-btn{background:linear-gradient(135deg,#EF4444,#F97316);color:#fff;border-radius:10px;padding:6px 14px;font-weight:800;font-size:12px;cursor:pointer;border:none;font-family:var(--font);text-decoration:none;white-space:nowrap;}
.rights-btn{background:linear-gradient(135deg,#16A34A,#15803D);color:#fff;border-radius:10px;padding:6px 14px;font-weight:800;font-size:11px;cursor:pointer;border:none;font-family:var(--font);text-decoration:none;white-space:nowrap;}
.rights-actions{display:flex;gap:5px;flex-shrink:0;}

.lang-menu{position:fixed;top:60px;left:10px;background:var(--card);border-radius:16px;padding:8px;box-shadow:0 8px 32px rgba(0,0,0,.2);z-index:600;display:flex;flex-direction:column;gap:4px;min-width:170px;animation:popUp .2s ease;max-height:80vh;overflow-y:auto;}
.lang-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:10px;cursor:pointer;font-size:14px;font-weight:700;border:none;background:none;font-family:var(--font);width:100%;text-align:right;}
.lang-item:hover{background:var(--bg);}
.lang-item.active{background:#EFF6FF;color:var(--blue);}

.acc-fab{position:fixed;left:14px;bottom:80px;z-index:400;width:50px;height:50px;border-radius:50%;background:linear-gradient(135deg,#8B5CF6,#6D28D9);color:#fff;border:none;cursor:pointer;font-size:22px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 18px rgba(139,92,246,.5);}
.acc-panel{position:fixed;left:14px;bottom:140px;z-index:600;background:var(--card);border-radius:20px;padding:16px;box-shadow:0 8px 40px rgba(0,0,0,.2);width:240px;animation:slideUp .25s ease;}
.acc-panel h3{font-size:14px;font-weight:800;margin-bottom:12px;color:var(--text);}
.acc-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;font-size:13px;color:var(--text);gap:8px;}
.acc-btns{display:flex;gap:4px;flex-wrap:wrap;}
.acc-btn{background:var(--bg);border:1.5px solid var(--border);border-radius:8px;padding:5px 8px;font-size:11px;font-weight:700;cursor:pointer;font-family:var(--font);}
.acc-btn.active{background:var(--blue);color:#fff;border-color:var(--blue);}
.acc-toggle{width:44px;height:24px;border-radius:12px;background:#CBD5E1;border:none;cursor:pointer;position:relative;transition:background .2s;flex-shrink:0;}
.acc-toggle.on{background:var(--blue);}
.acc-toggle::after{content:'';position:absolute;width:18px;height:18px;border-radius:50%;background:#fff;top:3px;left:3px;transition:left .2s;}
.acc-toggle.on::after{left:23px;}

.chat-fab{position:fixed;right:14px;bottom:80px;z-index:400;width:50px;height:50px;border-radius:50%;background:linear-gradient(135deg,#2563EB,#0EA5E9);color:#fff;border:none;cursor:pointer;font-size:22px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 18px rgba(37,99,235,.5);}
.chat-fab .chat-badge{position:absolute;top:-2px;right:-2px;width:14px;height:14px;border-radius:50%;background:#EF4444;border:2px solid #fff;animation:pulse 2s infinite;}
.chat-panel{position:fixed;right:14px;bottom:140px;z-index:600;background:var(--card);border-radius:20px;box-shadow:0 8px 40px rgba(0,0,0,.2);width:min(320px,calc(100vw-28px));display:flex;flex-direction:column;max-height:420px;animation:slideUp .25s ease;overflow:hidden;}
.chat-head{background:linear-gradient(135deg,#2563EB,#0EA5E9);padding:12px 14px;display:flex;align-items:center;gap:10px;border-radius:20px 20px 0 0;}
.chat-head-ico{width:32px;height:32px;border-radius:10px;background:rgba(255,255,255,.25);display:flex;align-items:center;justify-content:center;font-size:18px;}
.chat-head-txt{color:#fff;font-weight:800;font-size:14px;}
.chat-head-sub{color:rgba(255,255,255,.75);font-size:11px;}
.chat-close{margin-right:auto;background:none;border:none;color:#fff;font-size:20px;cursor:pointer;padding:2px 6px;}
.chat-msgs{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:8px;}
.chat-msg{max-width:85%;padding:9px 12px;border-radius:14px;font-size:13px;line-height:1.5;}
.chat-msg.user{background:linear-gradient(135deg,#2563EB,#0EA5E9);color:#fff;align-self:flex-start;border-radius:14px 14px 4px 14px;}
.chat-msg.ai{background:var(--bg);color:var(--text);align-self:flex-end;border-radius:14px 14px 14px 4px;border:1px solid var(--border);}
.chat-msg.typing{background:var(--bg);color:var(--muted);align-self:flex-end;}
.chat-input-row{display:flex;gap:7px;padding:10px 12px;border-top:1px solid var(--border);}
.chat-input-row input{flex:1;background:var(--bg);border:1.5px solid var(--border);border-radius:20px;padding:8px 12px;font-size:13px;font-family:var(--font);outline:none;color:var(--text);}
.chat-send{background:linear-gradient(135deg,#2563EB,#0EA5E9);color:#fff;border:none;border-radius:20px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;flex-shrink:0;}
.api-key-box{padding:12px;background:var(--bg);margin:8px;border-radius:12px;font-size:12px;color:var(--muted);border:1px solid var(--border);}
.api-key-box input{width:100%;background:var(--card);border:1.5px solid var(--border);border-radius:8px;padding:7px 10px;font-size:12px;font-family:var(--font);outline:none;margin:6px 0;color:var(--text);}
.api-key-box button{background:var(--blue);color:#fff;border:none;border-radius:8px;padding:6px 12px;font-size:12px;font-weight:700;cursor:pointer;font-family:var(--font);}

.forum-input{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:10px;padding:9px 12px;font-size:14px;font-family:var(--font);color:var(--text);outline:none;margin-bottom:8px;}
.forum-input:focus{border-color:var(--blue);}
.forum-textarea{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:10px;padding:9px 12px;font-size:14px;font-family:var(--font);color:var(--text);outline:none;resize:vertical;}
.forum-submit-btn{background:linear-gradient(135deg,#2563EB,#0EA5E9);color:#fff;border:none;border-radius:12px;padding:10px 22px;font-size:14px;font-weight:800;cursor:pointer;font-family:var(--font);}
.forum-cat-btn{background:var(--bg);border:1.5px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-weight:700;cursor:pointer;font-family:var(--font);color:var(--text);}
.forum-cat-btn.active{background:var(--blue);color:#fff;border-color:var(--blue);}
.forum-post{background:var(--card);border-radius:var(--radius);border:2px solid var(--border);padding:16px;margin-bottom:10px;}
.forum-post-head{display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap;}
.forum-post-avatar{width:36px;height:36px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:18px;}
.forum-post-name{font-weight:800;font-size:14px;}
.forum-post-meta{font-size:11px;color:var(--muted);}
.forum-post-body{font-size:13px;line-height:1.7;margin-bottom:10px;color:var(--text);}
.forum-post-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.forum-post-btn{background:var(--bg);border:1.5px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-weight:700;cursor:pointer;font-family:var(--font);color:var(--text);}
.forum-post-btn:hover{background:var(--blue);color:#fff;border-color:var(--blue);}
.forum-post-del{background:#FEF2F2;border-color:#FCA5A5;color:#EF4444;}
.forum-reply{background:var(--bg);border-radius:10px;padding:8px 10px;margin-bottom:6px;font-size:12px;}
.forum-tab-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;}

@keyframes cardIn{0%{opacity:0;transform:translateY(12px)}100%{opacity:1;transform:none}}
@keyframes fadeIn{0%{opacity:0}100%{opacity:1}}
@keyframes slideUp{0%{transform:translateY(100%)}100%{transform:none}}
@keyframes popIn{0%{opacity:0;transform:translateX(-50%) scale(.65)}100%{opacity:1;transform:translateX(-50%) scale(1)}}
@keyframes popUp{0%{opacity:0;transform:scale(.7)}100%{opacity:1;transform:scale(1)}}

let S={

  saved:new Set(JSON.parse(localStorage.getItem("kn_saved")||"[]")),
  modal:null,toast:null,tid:null,gps:null,
  accOpen:false,chatOpen:false,langOpen:false,

  chatMsgs:[],chatLoading:false,
  apiKey:localStorage.getItem("kn_api")||"",

};

// ═══════ HELPERS ═══════
function T(){return LANGS[S.lang]||LANGS.he;}
function el(tag,a={},html=""){const e=document.createElement(tag);for(const[k,v]of Object.entries(a))e.setAttribute(k,v);if(html)e.innerHTML=html;return e;}
function catOf(id){return CATS.find(c=>c.id===id)||CATS[0];}
function catLbl(c){return c[`lbl_${S.lang}`]||c.lbl_he;}
function shown(){return SVC.filter(s=>{
  if(S.cat!=="all"&&s.cat!==S.cat)return false;
  if(S.q){const q=S.q.toLowerCase();return[s.nm,s.org,s.desc,...s.tags].some(t=>t.toLowerCase().includes(q));}
  return true;
});}
function saveFavs(){localStorage.setItem("kn_saved",JSON.stringify([...S.saved]));}
function toast(msg,em="✅"){if(S.tid)clearTimeout(S.tid);S.toast={msg,em};render();S.tid=setTimeout(()=>{S.toast=null;render();},2500);}
function toggleSave(id){if(S.saved.has(id)){S.saved.delete(id);toast(T().removedFav,"💔");}else{S.saved.add(id);toast(T().addedFav);}saveFavs();render();}

// ═══════ GPS ═══════
function openNearbyMap(svc){
  if(!svc.mapq){toast("📍","📍");return;}
  S.gps={svc,loading:false};render();
}
function startGPS(svc){
  S.gps={svc,loading:true};render();
  if(!navigator.geolocation){openFallbackMap(svc);return;}
  navigator.geolocation.getCurrentPosition(
    pos=>{const{latitude:lat,longitude:lng}=pos.coords;
      const url=`https://www.google.com/maps/search/${encodeURIComponent(svc.mapq)}/@${lat},${lng},13z`;
      S.gps=null;render();window.open(url,"_blank");toast("📍","🧭");},
    ()=>openFallbackMap(svc),
    {timeout:8000,maximumAge:60000,enableHighAccuracy:true}
  );
}
function openFallbackMap(svc){
  S.gps=null;render();
  window.open(`https://www.google.com/maps/search/${encodeURIComponent(svc.mapq)}`,"_blank");
}

// ═══════ RENDER ═══════
function render(){
  const existingInput=document.querySelector('.srch-wrap input');
  const wasFocused=existingInput&&document.activeElement===existingInput;
  const cursorPos=wasFocused?existingInput.selectionStart:0;

  document.getElementById("html-root").setAttribute("dir",T().dir);
  document.getElementById("html-root").setAttribute("lang",S.lang);
  document.body.style.direction=T().dir;

  const root=document.getElementById("root");
  root.innerHTML="";
  if(S.toast)root.appendChild(el("div",{class:"toast"},`<span style="font-size:19px">${S.toast.em}</span> ${S.toast.msg}`));
  if(S.gps)root.appendChild(mkGpsPopup(S.gps));
  if(S.modal)root.appendChild(mkModal(S.modal));
  if(S.langOpen)document.body.appendChild(mkLangMenu()); else document.getElementById("lang-menu-el")?.remove();

  root.appendChild(mkHeader());
  if(S.tab==="home")root.appendChild(mkFilters());
  const main=el("div",{class:"main"});
  if(S.tab==="home")mkHome(main);
  else if(S.tab==="saved")mkSaved(main);
  else if(S.tab==="forum")mkForum(main);
  else mkAbout(main);
  root.appendChild(main);
  root.appendChild(mkBnav());

  if(wasFocused){
    const newInput=document.querySelector('.srch-wrap input');
    if(newInput){newInput.focus();try{newInput.setSelectionRange(cursorPos,cursorPos);}catch(e){}}
  }
}

// ═══════ HEADER ═══════
function mkHeader(){
  const h=el("header",{class:"hdr"});
  const r=el("div",{class:"hdr-row"});
  const logo=el("div",{class:"logo-wrap",role:"button",tabindex:"0"});
  logo.innerHTML=`<div class="logo-box">💙</div><div class="logo-txt"><div class="t1">${T().appName}</div><div class="t2">${T().appSub}</div></div>`;
  const goHome=()=>{S.tab="home";S.q="";S.cat="all";render();window.scrollTo(0,0);};
  logo.addEventListener("click",goHome);
  logo.addEventListener("keydown",e=>{if(e.key==="Enter"||e.key===" ")goHome();});
  const sw=el("div",{class:"srch-wrap"});
  const si=el("input",{type:"search",placeholder:T().search,value:S.q,"aria-label":T().search,autocomplete:"off"});
  si.addEventListener("input",e=>{S.q=e.target.value;S.tab="home";renderGrid();});
  si.addEventListener("keydown",e=>{if(e.key==="Enter"){e.preventDefault();S.q=si.value;S.tab="home";render();}});
  const sico=el("span",{class:"srch-ico",role:"button",tabindex:"0"});
  sico.textContent="🔍";
  sico.addEventListener("click",()=>{S.q=document.querySelector('.srch-wrap input')?.value||S.q;S.tab="home";render();});
  sw.appendChild(si);sw.appendChild(sico);
  const lb=el("button",{class:"lang-btn"});
  lb.textContent=`🌐 ${T().flag}`;
  lb.addEventListener("click",e=>{e.stopPropagation();S.langOpen=!S.langOpen;render();});
  const actions=el("div",{class:"hdr-actions"});actions.appendChild(lb);
  r.appendChild(logo);r.appendChild(sw);r.appendChild(actions);
  h.appendChild(r);return h;
}

function renderGrid(){
  const gridEl=document.querySelector(".grid");
  const ttlEl=document.querySelector(".sec-ttl");
  if(!gridEl||!ttlEl)return render();
  const list=shown();
  const c=catOf(S.cat);
  const lbl=S.cat==="all"?T().allServices:catLbl(c);
  ttlEl.innerHTML=`<span style="font-size:22px">${c.em}</span>${lbl} <span class="count-badge">${list.length}</span>`;
  gridEl.innerHTML="";
  if(!list.length){gridEl.innerHTML=`<div class="empty" style="grid-column:1/-1"><div class="ee">🔍</div><p>${T().noServices}</p></div>`;return;}
  list.forEach((s,i)=>{const card=mkCard(s,i);gridEl.appendChild(card);});
}

function mkFilters(){
  const fb=el("div",{class:"fbar"});const fi=el("div",{class:"fbar-in",role:"tablist"});
  CATS.forEach(c=>{
    const b=el("button",{class:"fcat"+(S.cat===c.id?" on":""),role:"tab"});
    b.innerHTML=`<span>${c.em}</span>${catLbl(c)}`;
    if(S.cat===c.id)b.style.background=c.col;
    b.addEventListener("click",()=>{S.cat=c.id;S.tab="home";S.q="";render();window.scrollTo(0,0);});
    fi.appendChild(b);
  });
  fb.appendChild(fi);return fb;
}

function mkHome(main){
  const bn=el("div",{class:"banner"});
  bn.innerHTML=`<div class="bi">💡</div><div class="bt"><b>${T().tipTitle}</b>${T().tipText}</div>`;
  main.appendChild(bn);
  const list=shown();
  const c=catOf(S.cat);
  const lbl=S.cat==="all"?T().allServices:catLbl(c);
  const ttl=el("div",{class:"sec-ttl"});
  ttl.innerHTML=`<span style="font-size:22px">${c.em}</span>${lbl} <span class="count-badge">${list.length}</span>`;
  main.appendChild(ttl);
  if(!list.length){main.appendChild(el("div",{class:"empty"},`<div class="ee">🔍</div><p>${T().noServices}</p>`));return;}
  const grid=el("div",{class:"grid"});
  list.forEach((s,i)=>grid.appendChild(mkCard(s,i)));
  main.appendChild(grid);
}

function mkSaved(main){
  const list=SVC.filter(s=>S.saved.has(s.id));
  const ttl=el("div",{class:"sec-ttl"});
  ttl.innerHTML=`<span style="font-size:22px">⭐</span>${T().saved} <span class="count-badge">${list.length}</span>`;
  main.appendChild(ttl);
  if(!list.length){main.appendChild(el("div",{class:"empty"},`<div class="ee">⭐</div><p>${T().noSaved}</p>`));return;}
  const grid=el("div",{class:"grid"});
  list.forEach((s,i)=>grid.appendChild(mkCard(s,i)));
  main.appendChild(grid);
}

function mkCard(s,i){
  const c=el("div",{class:"card",role:"article",tabindex:"0"});
  c.style.animationDelay=(i*.03)+"s";
  const saved=S.saved.has(s.id);
  const t=T();
  c.innerHTML=`
    <div class="card-top-bar" style="background:linear-gradient(90deg,${s.col},${s.col}88);"></div>
    <div class="card-body">
      <div class="card-head">
        <div class="card-icon" style="background:${s.col}18;border:2px solid ${s.col}33;">${s.em}</div>
        <div class="card-ti">
          <div class="cn">${s.nm}</div>
          <div class="co">${s.org}</div>
          ${s.verified?`<div class="vbadge">${t.verified}</div>`:""}
        </div>
      </div>
      <div class="card-tags">
        <span class="tag tag-cat" style="background:${s.col};">${catOf(s.cat).em} ${catLbl(catOf(s.cat))}</span>
        ${s.tags.slice(0,2).map(tag=>`<span class="tag tag-plain">${tag}</span>`).join("")}
      </div>
      <div class="card-desc">${s.desc}</div>
      <div class="card-loc">📍 ${s.loc}</div>
      <div class="card-acts">
        ${s.phone?`<button class="act-btn act-call" data-a="call" data-v="${s.phone}">📞 ${t.call}</button>`:""}
        ${s.wa?`<button class="act-btn act-wa" data-a="wa" data-v="${s.wa}">💬 ${t.wa}</button>`:""}
        ${s.mapq?`<button class="act-btn act-map" data-a="map" data-id="${s.id}">🧭 ${t.map}</button>`:""}
        ${s.web?`<button class="act-btn act-web" data-a="web" data-v="${s.web}">🔗 ${t.site}</button>`:""}
        <button class="act-btn act-save${saved?" on":""}" data-a="save" data-v="${s.id}">${saved?"⭐":"☆"}</button>
      </div>
    </div>`;
  c.addEventListener("click",e=>{
    const btn=e.target.closest("button[data-a]");
    if(btn){
      const{a,v,id}=btn.dataset;
      if(a==="call"){window.open("tel:"+v);return;}
      if(a==="wa"){window.open("https://wa.me/"+v);return;}
      if(a==="map"){openNearbyMap(SVC.find(x=>x.id===+id));return;}
      if(a==="web"){window.open(v,"_blank");return;}
      if(a==="save"){toggleSave(parseInt(v));return;}
    }
    S.modal=s;render();
  });
  c.addEventListener("keydown",e=>{if(e.key==="Enter")c.click();});
  return c;
}

  if(s.phone){const b=el("button",{class:"m-btn mb-primary"});b.innerHTML=`📞 ${t.call}`;b.onclick=()=>window.open("tel:"+s.phone);acts.appendChild(b);}
  if(s.wa){const b=el("button",{class:"m-btn mb-wa"});b.innerHTML=`💬 ${t.wa}`;b.onclick=()=>window.open("https://wa.me/"+s.wa);acts.appendChild(b);}
  if(s.mapq){const b=el("button",{class:"m-btn mb-map"});b.innerHTML=`🧭 ${t.map}`;b.onclick=()=>{S.modal=null;openNearbyMap(s);};acts.appendChild(b);}
  if(s.web){const b=el("button",{class:"m-btn mb-sec"});b.innerHTML=`🔗 ${t.site}`;b.onclick=()=>window.open(s.web,"_blank");acts.appendChild(b);}
  const sv=el("button",{class:"m-btn mb-sec"});sv.innerHTML=saved?`⭐ ${t.saved2}`:`☆ ${t.save}`;sv.onclick=()=>{toggleSave(s.id);S.modal={...s};render();};acts.appendChild(sv);
  m.appendChild(acts);
  ov.onclick=e=>{if(e.target===ov){S.modal=null;render();}};
  ov.appendChild(m);return ov;
}

// ═══════ FORUM ═══════
function mkForum(main){
  const t=T();
  const posts=JSON.parse(localStorage.getItem("kn_forum")||"[]");
  const filtered=S.forumFilter==="all"?posts:posts.filter(p=>p.cat===S.forumFilter);

  const wrap=el("div");
  wrap.innerHTML=`
    <div style="background:linear-gradient(135deg,#1E3A8A,#2563EB);border-radius:var(--radius);padding:18px;color:#fff;margin-bottom:14px;">
      <div style="font-size:24px;margin-bottom:6px;font-weight:900;">${t.forumTitle}</div>
      <div style="font-size:13px;opacity:.85;">${t.forumSub}</div>
    </div>

    <div class="about-card">
      <h3>${t.forumNew}</h3>
      <input id="forum-name" type="text" placeholder="${t.forumName}" maxlength="30" class="forum-input"/>
      <div class="forum-tab-bar" id="forum-cat-picker">
        ${Object.entries(t.forumCats).map(([k,v],i)=>`
          <button class="forum-cat-btn${i===0?" active":""}" data-cat="${k}">${v}</button>
        `).join("")}
      </div>
      <textarea id="forum-text" placeholder="${t.forumTextPH}" maxlength="500" rows="4" class="forum-textarea"></textarea>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-top:8px;">
        <span id="forum-count" style="font-size:11px;color:var(--muted);">0 / 500</span>
        <button id="forum-submit" class="forum-submit-btn">${t.forumPost}</button>
      </div>
    </div>

    <div class="about-card">
      <div style="display:flex;gap:6px;flex-wrap:wrap;">
        <button class="forum-cat-btn${S.forumFilter==="all"?" active":""}" data-filter="all">🌐 ${t.forumFilterAll}</button>
        ${Object.entries(t.forumCats).map(([k,v])=>`
          <button class="forum-cat-btn${S.forumFilter===k?" active":""}" data-filter="${k}">${v}</button>
        `).join("")}
      </div>
    </div>

    <div id="forum-posts"></div>
  `;
  main.appendChild(wrap);

  // Category picker for new posts
  let selectedCat=Object.keys(t.forumCats)[0];
  document.querySelectorAll("#forum-cat-picker .forum-cat-btn").forEach(btn=>{
    btn.addEventListener("click",()=>{
      document.querySelectorAll("#forum-cat-picker .forum-cat-btn").forEach(b=>b.classList.remove("active"));
      btn.classList.add("active");
      selectedCat=btn.dataset.cat;
    });
  });

  // Filter buttons
  document.querySelectorAll("[data-filter]").forEach(btn=>{
    btn.addEventListener("click",()=>{
      S.forumFilter=btn.dataset.filter;
      render();
    });
  });

  // Character counter
  const textarea=document.getElementById("forum-text");
  const counter=document.getElementById("forum-count");
  textarea?.addEventListener("input",()=>{counter.textContent=`${textarea.value.length} / 500`;});

  renderForumPosts(filtered,t);

  document.getElementById("forum-submit")?.addEventListener("click",()=>{
    const name=(document.getElementById("forum-name").value.trim()||t.forumAnon);
    const text=document.getElementById("forum-text").value.trim();
    if(!text){
      textarea.style.borderColor="#EF4444";
      setTimeout(()=>textarea.style.borderColor="",2000);
      return;
    }
    const allPosts=JSON.parse(localStorage.getItem("kn_forum")||"[]");
    const post={id:Date.now(),name,text,cat:selectedCat,time:new Date().toLocaleDateString(),likes:0,replies:[]};
    allPosts.unshift(post);
    localStorage.setItem("kn_forum",JSON.stringify(allPosts.slice(0,200)));
    document.getElementById("forum-text").value="";
    document.getElementById("forum-name").value="";
    counter.textContent="0 / 500";
    toast(t.forumPosted,"💬");
    render();
  });
}

function renderForumPosts(posts,t){
  const container=document.getElementById("forum-posts");
  if(!container)return;
  if(!posts.length){
    container.innerHTML=`<div class="empty"><div class="ee">💬</div><p>${S.forumFilter==="all"?t.forumEmpty:t.forumNoCat}</p></div>`;
    return;
  }
  const catColors={שאלה:"#2563EB",ניסיון:"#F59E0B",המלצה:"#10B981",עזרה:"#EC4899",תודה:"#8B5CF6",כללי:"#64748B"};
  const catEmojis={שאלה:"❓",ניסיון:"💡",המלצה:"⭐",עזרה:"🤝",תודה:"💙",כללי:"💬"};
  container.innerHTML=posts.map((p,i)=>`
    <div class="forum-post" style="border-right:4px solid ${catColors[p.cat]||"#2563EB"};">
      <div class="forum-post-head">
        <span class="forum-post-avatar" style="background:${catColors[p.cat]||"#2563EB"}22;">${catEmojis[p.cat]||"💬"}</span>
        <div style="flex:1;min-width:0;">
          <div class="forum-post-name">${escapeHtml(p.name)}</div>
          <div class="forum-post-meta">${p.time} · <span style="color:${catColors[p.cat]||"#2563EB"};font-weight:700;">${t.forumCats[p.cat]||p.cat}</span></div>
        </div>
      </div>
      <p class="forum-post-body">${escapeHtml(p.text)}</p>
      <div class="forum-post-actions">
        <button class="forum-post-btn" data-act="like" data-i="${p.id}">👍 ${p.likes||0}</button>
        <button class="forum-post-btn" data-act="reply" data-i="${p.id}">${t.forumReply} ${p.replies?.length?`(${p.replies.length})`:""}</button>
        <button class="forum-post-btn forum-post-del" data-act="del" data-i="${p.id}">🗑️</button>
      </div>
      ${p.replies?.length?`
        <div style="margin-top:10px;padding-top:10px;border-top:1px solid var(--border);">
          ${p.replies.map(r=>`
            <div class="forum-reply">
              <span style="font-weight:700;">${escapeHtml(r.name)}</span>
              <span style="color:var(--muted);font-size:11px;margin-right:6px;">${r.time}</span>
              <p style="margin:4px 0 0;">${escapeHtml(r.text)}</p>
            </div>`).join("")}
        </div>`:""}
      <div id="reply-form-${p.id}" style="display:none;margin-top:8px;">
        <textarea id="reply-text-${p.id}" placeholder="${t.forumReplyPH}" rows="2" maxlength="200" class="forum-textarea" style="margin-bottom:6px;"></textarea>
        <button class="forum-submit-btn" data-act="reply-send" data-i="${p.id}" style="padding:7px 16px;font-size:12px;">${t.forumReplySend}</button>
      </div>
    </div>`).join("");

  // Bind events
  container.querySelectorAll("[data-act]").forEach(btn=>{
    btn.addEventListener("click",()=>{
      const id=parseInt(btn.dataset.i);
      const act=btn.dataset.act;
      const allPosts=JSON.parse(localStorage.getItem("kn_forum")||"[]");
      const idx=allPosts.findIndex(x=>x.id===id);
      if(idx<0)return;
      if(act==="like"){
        allPosts[idx].likes=(allPosts[idx].likes||0)+1;
        localStorage.setItem("kn_forum",JSON.stringify(allPosts));
        render();
      }else if(act==="del"){
        if(!confirm(t.forumDelConfirm))return;
        allPosts.splice(idx,1);
        localStorage.setItem("kn_forum",JSON.stringify(allPosts));
        toast(t.forumDeleted,"🗑️");
        render();
      }else if(act==="reply"){
        const f=document.getElementById(`reply-form-${id}`);
        if(f)f.style.display=f.style.display==="none"?"block":"none";
      }else if(act==="reply-send"){
        const text=document.getElementById(`reply-text-${id}`)?.value.trim();
        if(!text)return;
        if(!allPosts[idx].replies)allPosts[idx].replies=[];
        allPosts[idx].replies.push({name:t.forumAnon,text,time:new Date().toLocaleDateString()});
        localStorage.setItem("kn_forum",JSON.stringify(allPosts));
        toast(t.forumReplied,"💬");
        render();
      }
    });
  });
}

function escapeHtml(str){
  return String(str).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"})[c]);
}

function mkLangMenu(){
  const menu=el("div",{class:"lang-menu",id:"lang-menu-el",role:"menu"});

const accFab=document.getElementById("acc-fab");

function showAccPanel(){
  accPanelEl?.remove();

  const panel=el("div",{class:"acc-panel"});
  const sizes=[{v:"13px",l:t.accSmall},{v:"16px",l:t.accNormal},{v:"19px",l:t.accLarge},{v:"22px",l:t.accXL}];

    <h3>♿ ${t.accTitle}</h3>

      <span>${t.accFontSize}</span>
      <div class="acc-btns">

      <span>${t.accContrast}</span>

    </div>`;
  panel.querySelectorAll(".acc-btn").forEach(b=>{
    b.addEventListener("click",()=>{

      localStorage.setItem("kn_fs",S.fs);

// ═══════ AI CHAT ═══════
const chatFab=document.getElementById("chat-fab");
let chatPanelEl=null;
if(S.chatMsgs.length===0){S.chatMsgs=[{role:"ai",text:LANGS[S.lang].chatWelcome}];}
chatFab.addEventListener("click",e=>{
  e.stopPropagation();
  S.chatOpen=!S.chatOpen;
  if(S.chatOpen)showChatPanel();
  else{chatPanelEl?.remove();chatPanelEl=null;}
});

function showChatPanel(){
  chatPanelEl?.remove();
  const t=T();
  const panel=el("div",{class:"chat-panel"});
  const head=el("div",{class:"chat-head"});
  head.innerHTML=`<div class="chat-head-ico">🤖</div><div><div class="chat-head-txt">${t.chatTitle}</div><div class="chat-head-sub">${t.chatSub}</div></div>`;
  const closeBtn=el("button",{class:"chat-close"});closeBtn.textContent="✕";
  closeBtn.onclick=()=>{S.chatOpen=false;chatPanelEl?.remove();chatPanelEl=null;};
  head.appendChild(closeBtn);
  panel.appendChild(head);
  if(!S.apiKey){
    const keyBox=el("div",{class:"api-key-box"});
    keyBox.innerHTML=`<div>${t.chatApiHelp}</div>`;
    const inp=el("input",{type:"password",placeholder:t.chatApiKey});
    const saveBtn=el("button");saveBtn.textContent=t.chatApiSave;
    saveBtn.onclick=()=>{if(inp.value.trim()){S.apiKey=inp.value.trim();localStorage.setItem("kn_api",S.apiKey);showChatPanel();}};
    keyBox.appendChild(inp);keyBox.appendChild(saveBtn);
    panel.appendChild(keyBox);
  }
  const msgs=el("div",{class:"chat-msgs",role:"log"});
  S.chatMsgs.forEach(m=>{
    const d=el("div",{class:`chat-msg ${m.role}`});d.textContent=m.text;msgs.appendChild(d);
  });
  if(S.chatLoading){const d=el("div",{class:"chat-msg typing"});d.textContent=t.chatTyping;msgs.appendChild(d);}
  panel.appendChild(msgs);
  setTimeout(()=>{msgs.scrollTop=msgs.scrollHeight;},50);
  const inputRow=el("div",{class:"chat-input-row"});
  const inp=el("input",{type:"text",placeholder:t.chatPlaceholder});
  const sendBtn=el("button",{class:"chat-send"});sendBtn.textContent="➤";
  const sendMsg=async()=>{
    const q=inp.value.trim();if(!q)return;
    inp.value="";
    S.chatMsgs.push({role:"user",text:q});
    S.chatLoading=true;
    showChatPanel();
    try{
      const langInstructions={he:"ענה בעברית",en:"Respond in English",ar:"أجب بالعربية",am:"በአማርኛ መልስ",ru:"Отвечайте на русском",es:"Responde en español"};
      const res=await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",
        headers:{"Content-Type":"application/json","x-api-key":S.apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
        body:JSON.stringify({
          model:"claude-sonnet-4-20250514",max_tokens:500,
          system:`You are the Kanafayim assistant – a guide for special needs services in Israel. ${langInstructions[S.lang]||"Respond in Hebrew"}. Help parents and caregivers find suitable services. Available services: ${SVC.map(s=>s.nm).join(", ")}.`,
          messages:S.chatMsgs.filter(m=>m.role!=="ai").map(m=>({role:"user",content:m.text})).concat([{role:"user",content:q}])
        })
      });
      const d=await res.json();
      const reply=d.content?.[0]?.text||t.chatErr;
      S.chatMsgs.push({role:"ai",text:reply});
    }catch(e){
      S.chatMsgs.push({role:"ai",text:t.chatErr});
    }
    S.chatLoading=false;
    showChatPanel();
  };
  inp.addEventListener("keydown",e=>{if(e.key==="Enter"){e.preventDefault();sendMsg();}});
  sendBtn.addEventListener("click",sendMsg);
  inputRow.appendChild(inp);inputRow.appendChild(sendBtn);
  panel.appendChild(inputRow);
  document.body.appendChild(panel);
  chatPanelEl=panel;
  setTimeout(()=>inp.focus(),100);
}

// ═══════ OUTSIDE CLICK CLOSING ═══════
document.addEventListener("click",e=>{

  if(S.accOpen&&accPanelEl&&!e.target.closest(".acc-panel")&&!e.target.closest(".acc-fab")){S.accOpen=false;accPanelEl?.remove();accPanelEl=null;}

});

// ═══════ PWA ═══════
let deferredPrompt=null;
if("serviceWorker" in navigator){
  window.addEventListener("load",()=>{
    navigator.serviceWorker.register("./sw.js").catch(e=>console.warn("[PWA]",e));
  });
}
window.addEventListener("beforeinstallprompt",e=>{
  e.preventDefault();deferredPrompt=e;
  const b=document.getElementById("install-banner");
  if(b)b.style.display="flex";
});
window.addEventListener("appinstalled",()=>{
  const b=document.getElementById("install-banner");
  if(b)b.style.display="none";
  toast(T().installed,"💙");
});
document.getElementById("install-btn")?.addEventListener("click",async()=>{
  if(!deferredPrompt){toast("📱","📱");return;}
  deferredPrompt.prompt();
  const{outcome}=await deferredPrompt.userChoice;
  deferredPrompt=null;
  if(outcome==="accepted")toast(T().installed,"💙");
});

if(urlCat&&CATS.find(c=>c.id===urlCat))S.cat=urlCat;

render();

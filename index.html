<style>
/* ══════════════════════════════════════
   DESIGN TOKENS
══════════════════════════════════════ */
:root{
  --blue:#2563EB;--teal:#0EA5E9;--green:#10B981;--orange:#F59E0B;
  --pink:#EC4899;--purple:#8B5CF6;--red:#EF4444;--warm:#F97316;
  --lime:#84CC16;--cyan:#06B6D4;--rose:#F43F5E;
  --bg:#F0F7FF;--card:#FFFFFF;--text:#1E293B;--muted:#64748B;--border:#E2EAF4;
  --radius:22px;--font:'Heebo',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:var(--font);background:var(--bg);color:var(--text);direction:rtl;min-height:100vh;font-size:16px;}
a{text-decoration:none;color:inherit;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-thumb{background:rgba(0,0,0,.15);border-radius:4px;}

/* ── HEADER ── */
.hdr{background:linear-gradient(135deg,#1E3A8A 0%,#2563EB 55%,#0EA5E9 100%);padding:12px 16px;position:sticky;top:0;z-index:200;box-shadow:0 4px 24px rgba(30,58,138,.3);}
.hdr-row{display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.logo-wrap{display:flex;align-items:center;gap:10px;cursor:pointer;}
.logo-box{width:46px;height:46px;border-radius:14px;background:rgba(255,255,255,.2);border:2px solid rgba(255,255,255,.35);display:flex;align-items:center;justify-content:center;font-size:24px;}
.logo-txt .t1{font-size:19px;font-weight:900;color:#fff;line-height:1;}
.logo-txt .t2{font-size:10px;color:rgba(255,255,255,.7);margin-top:1px;}
.srch-wrap{flex:1;min-width:180px;position:relative;}
.srch-wrap input{width:100%;background:rgba(255,255,255,.18);border:2px solid rgba(255,255,255,.3);border-radius:50px;padding:10px 42px 10px 16px;color:#fff;font-size:15px;font-family:var(--font);outline:none;}
.srch-wrap input::placeholder{color:rgba(255,255,255,.6);}
.srch-ico{position:absolute;right:14px;top:50%;transform:translateY(-50%);font-size:19px;}
.hdr-stats{display:flex;gap:14px;align-items:center;}
.hdr-stat{color:rgba(255,255,255,.85);font-size:12px;font-weight:700;white-space:nowrap;}
.hdr-stat span{display:block;font-size:18px;font-weight:900;color:#93C5FD;line-height:1;}

/* ── HERO ── */
.hero{background:linear-gradient(160deg,#1E3A8A 0%,#2563EB 50%,#0EA5E9 100%);padding:28px 16px 24px;text-align:center;color:#fff;position:relative;overflow:hidden;}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 70% 60% at 15% 30%,rgba(139,92,246,.2) 0%,transparent 60%),radial-gradient(ellipse 50% 40% at 85% 70%,rgba(16,185,129,.15) 0%,transparent 55%);}
.hero-in{position:relative;max-width:680px;margin:0 auto;}
.hero h1{font-size:clamp(20px,5.5vw,32px);font-weight:900;line-height:1.2;margin-bottom:8px;}
.hero h1 b{color:#93C5FD;}
.hero p{font-size:14px;opacity:.85;line-height:1.65;max-width:480px;margin:0 auto 18px;}
.hero-nums{display:flex;justify-content:center;gap:24px;flex-wrap:wrap;}
.hnum .n{font-size:28px;font-weight:900;color:#FDE68A;line-height:1;}
.hnum .l{font-size:11px;opacity:.7;margin-top:1px;}

/* ── INSTALL BANNER ── */
#install-banner{
  display:none;
  background:linear-gradient(135deg,#1E3A8A,#2563EB);
  color:#fff;padding:12px 16px;
  flex-direction:row;align-items:center;justify-content:space-between;gap:10px;
}
#install-banner p{font-size:13px;font-weight:600;flex:1;}
#install-banner button{background:#fff;color:#1E3A8A;border:none;border-radius:20px;padding:8px 18px;font-weight:800;font-size:13px;cursor:pointer;font-family:var(--font);}

/* ── FILTERS ── */
.fbar{background:#fff;border-bottom:2px solid var(--border);position:sticky;top:72px;z-index:150;box-shadow:0 2px 14px rgba(0,0,0,.07);}
.fbar-in{display:flex;gap:8px;padding:10px 14px;overflow-x:auto;scrollbar-width:none;}
.fbar-in::-webkit-scrollbar{height:0;}
.fcat{display:flex;align-items:center;gap:6px;white-space:nowrap;border:2px solid var(--border);border-radius:50px;padding:8px 16px;font-size:14px;font-weight:700;cursor:pointer;font-family:var(--font);background:var(--bg);color:var(--muted);transition:all .2s;}
.fcat.on{color:#fff;border-color:transparent;box-shadow:0 4px 14px rgba(0,0,0,.18);transform:scale(1.05);}
.fcat .ce{font-size:17px;}

/* ── MAIN ── */
.main{max-width:920px;margin:0 auto;padding:16px 14px 100px;}

/* ── BANNER ── */
.banner{background:linear-gradient(135deg,#FFFBEB,#FEF3C7);border:2px solid #F59E0B;border-radius:var(--radius);padding:14px 16px;margin-bottom:18px;display:flex;align-items:flex-start;gap:12px;}
.banner .bi{font-size:28px;flex-shrink:0;margin-top:2px;}
.banner .bt{font-size:13px;line-height:1.6;color:#92400E;}
.banner .bt b{display:block;font-size:15px;font-weight:800;margin-bottom:3px;}

/* ── SEC TITLE ── */
.sec-ttl{font-size:18px;font-weight:800;color:var(--text);margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.sec-ttl .si{font-size:22px;}
.count-badge{background:var(--blue);color:#fff;border-radius:20px;font-size:12px;padding:2px 10px;font-weight:700;}

/* ── GRID ── */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:14px;margin-bottom:28px;}

/* ── CARD ── */
.card{background:var(--card);border-radius:var(--radius);border:2px solid var(--border);padding:0;cursor:pointer;box-shadow:0 2px 14px rgba(0,0,0,.06);transition:transform .22s cubic-bezier(.34,1.56,.64,1),box-shadow .22s,border-color .22s;overflow:hidden;animation:cardIn .3s ease both;}
.card:hover{transform:translateY(-5px);box-shadow:0 14px 36px rgba(0,0,0,.13);}
.card:active{transform:scale(.97);}
.card-top-bar{height:6px;width:100%;}
.card-body{padding:16px;}
.card-head{display:flex;align-items:flex-start;gap:12px;margin-bottom:12px;}
.card-icon{width:56px;height:56px;border-radius:18px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:28px;}
.card-ti .cn{font-size:16px;font-weight:800;color:var(--text);line-height:1.2;margin-bottom:3px;}
.card-ti .co{font-size:12px;color:var(--muted);font-weight:500;}
.card-ti .vbadge{display:inline-flex;align-items:center;gap:3px;font-size:10px;font-weight:700;color:#059669;background:#D1FAE5;border-radius:20px;padding:1px 7px;margin-top:3px;}
.card-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px;}
.tag{font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;}
.tag-cat{color:#fff;}
.tag-plain{background:var(--bg);color:var(--muted);border:1px solid var(--border);}
.card-desc{font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:12px;}
.card-loc{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--muted);margin-bottom:10px;}
.card-acts{display:flex;gap:6px;flex-wrap:wrap;}
.act-btn{display:flex;align-items:center;gap:5px;border:none;border-radius:12px;padding:7px 12px;font-size:12px;font-weight:700;cursor:pointer;font-family:var(--font);transition:all .18s;white-space:nowrap;}
.act-call{background:#DCFCE7;color:#16A34A;}
.act-call:hover{background:#16A34A;color:#fff;}
.act-wa{background:#D1FAE5;color:#047857;}
.act-wa:hover{background:#10B981;color:#fff;}
.act-map{background:#DBEAFE;color:#1D4ED8;}
.act-map:hover{background:#1D4ED8;color:#fff;}
.act-web{background:#EDE9FE;color:#6D28D9;}
.act-web:hover{background:#7C3AED;color:#fff;}
.act-save{background:var(--bg);color:var(--muted);border:1.5px solid var(--border);}
.act-save.on{background:#FEF9C3;color:#854D0E;border-color:#FDE68A;}

/* ── MODAL ── */
.ov{position:fixed;inset:0;background:rgba(15,23,42,.65);backdrop-filter:blur(10px);z-index:500;display:flex;align-items:flex-end;animation:fadeIn .2s;}
.modal{background:#fff;border-radius:30px 30px 0 0;width:100%;max-height:90vh;overflow-y:auto;padding:0 0 40px;animation:slideUp .3s cubic-bezier(.34,1.56,.64,1);max-width:600px;margin:0 auto;}
.modal-bar{height:8px;border-radius:8px 8px 0 0;}
.modal-in{padding:20px 20px 0;}
.m-handle{width:44px;height:5px;background:#E2E8F0;border-radius:3px;margin:0 auto 18px;}
.m-head{display:flex;align-items:flex-start;gap:14px;margin-bottom:16px;}
.m-icon{width:68px;height:68px;border-radius:22px;display:flex;align-items:center;justify-content:center;font-size:34px;flex-shrink:0;}
.m-title{font-size:21px;font-weight:900;line-height:1.2;margin-bottom:3px;}
.m-sub{font-size:13px;color:var(--muted);}
.m-sec{margin-bottom:16px;}
.m-sec h3{font-size:12px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px;}
.m-sec p{font-size:14px;line-height:1.7;color:var(--text);}
.info-row{display:flex;align-items:center;gap:10px;font-size:14px;padding:6px 0;border-bottom:1px solid var(--border);}
.info-row:last-child{border:none;}
.info-row .ii{font-size:20px;width:26px;text-align:center;}
.m-acts{display:flex;gap:10px;flex-wrap:wrap;margin-top:18px;padding:0 20px;}
.m-btn{flex:1;min-width:120px;border:none;border-radius:16px;padding:14px 10px;font-size:14px;font-weight:800;cursor:pointer;font-family:var(--font);transition:all .18s;display:flex;align-items:center;justify-content:center;gap:7px;}
.mb-primary{background:linear-gradient(135deg,#2563EB,#0EA5E9);color:#fff;box-shadow:0 4px 16px rgba(37,99,235,.3);}
.mb-wa{background:linear-gradient(135deg,#25D366,#128C7E);color:#fff;box-shadow:0 4px 16px rgba(37,211,102,.3);}
.mb-map{background:linear-gradient(135deg,#EA4335,#FBBC04);color:#fff;box-shadow:0 4px 16px rgba(234,67,53,.3);}
.mb-sec{background:var(--bg);color:var(--text);border:2px solid var(--border);}

/* ── BOTTOM NAV ── */
.bnav{position:fixed;bottom:0;left:0;right:0;z-index:300;background:rgba(255,255,255,.96);backdrop-filter:blur(20px);border-top:2px solid var(--border);box-shadow:0 -4px 20px rgba(0,0,0,.09);display:flex;justify-content:space-around;padding:8px 0 env(safe-area-inset-bottom,12px);}
.nb{display:flex;flex-direction:column;align-items:center;gap:2px;background:none;border:none;cursor:pointer;padding:6px 18px;border-radius:16px;font-family:var(--font);transition:transform .18s;}
.nb .ni{font-size:26px;filter:grayscale(50%) opacity(.55);transition:filter .18s;}
.nb .nl{font-size:10px;color:#aaa;font-weight:700;}
.nb.on .ni{filter:none;}
.nb.on .nl{color:var(--blue);}
.nb.on{transform:scale(1.12);}
.nb-dot{width:6px;height:6px;border-radius:50%;background:var(--blue);box-shadow:0 0 8px var(--blue);margin-top:1px;}

/* ── TOAST ── */
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#1E293B;color:#fff;border-radius:50px;padding:12px 26px;font-size:14px;font-weight:700;box-shadow:0 8px 32px rgba(0,0,0,.3);z-index:9999;display:flex;align-items:center;gap:9px;animation:popIn .3s cubic-bezier(.34,1.56,.64,1);}

/* ── EMPTY / ABOUT ── */
.empty{text-align:center;padding:60px 20px;color:var(--muted);}
.empty .ee{font-size:60px;margin-bottom:14px;}
.empty p{font-size:17px;font-weight:700;}
.about-card{background:#fff;border-radius:var(--radius);border:2px solid var(--border);padding:22px;margin-bottom:14px;}
.about-card h3{font-size:16px;font-weight:800;margin-bottom:12px;}
.about-item{display:flex;gap:10px;align-items:flex-start;font-size:14px;padding:6px 0;line-height:1.5;}
.emer-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--border);font-size:14px;}
.emer-row:last-child{border:none;}
.emer-btn{background:linear-gradient(135deg,#EF4444,#F97316);color:#fff;border-radius:12px;padding:7px 16px;font-weight:800;font-size:13px;cursor:pointer;border:none;font-family:var(--font);text-decoration:none;}

/* ── ANIMATIONS ── */
@keyframes cardIn{0%{opacity:0;transform:translateY(14px)}100%{opacity:1;transform:none}}
@keyframes fadeIn{0%{opacity:0}100%{opacity:1}}
@keyframes slideUp{0%{transform:translateY(100%)}100%{transform:none}}
@keyframes popIn{0%{opacity:0;transform:translateX(-50%) scale(.65)}100%{opacity:1;transform:translateX(-50%) scale(1)}}
</style>
</head>

  {id:31,cat:"recreation",em:"🌲",col:"#10B981",nm:"LOTEM – טבע נגיש",org:"LOTEM",tags:["טיול","נגישות","גלגלייה"],desc:"טיולים, מסלולים נגישים וסדנאות בטבע לאנשים עם מוגבלות.",loc:"כלל הארץ",phone:"",wa:"",web:"https://www.lotem.net",map:"https://maps.google.com/?q=LOTEM+Israel+nature",verified:true,full:"LOTEM מתמחה בנגישות לטבע. מציעה מסלולים נגישים, גלגלאי שדה וסדנאות טבע בעשרות אתרים."},
  {id:32,cat:"recreation",em:"🎈",col:"#EC4899",nm:"שמחה לילד",org:"בתי חולים ושיקום",tags:["בית חולים","ילדים חולים","שמחה"],desc:"מביאה שמחה לילדים חולים ומוגבלים. פנאי, מוזיקה ואומנות.",loc:"כלל הארץ",phone:"",wa:"",web:"https://www.simchalayeled.org.il",map:"https://maps.google.com/?q=שמחה+לילד+ישראל",verified:true,full:"שמחה לילד פועלת בבתי חולים ומרכזי שיקום. מציעה פעילויות פנאי, מוזיקה, אומנות וסיוע רגשי."},
  {id:33,cat:"recreation",em:"🫂",col:"#F97316",nm:"Friendship Circle Israel",org:"79 מיקומים עולמיים",tags:["מתנדבים","נוער","חברות"],desc:"חברויות אמיתיות בין ילדים עם צרכים מיוחדים למתנדבי נוער.",loc:"כלל הארץ",phone:"",wa:"",web:"https://www.friendshipcircle.org",map:"https://maps.google.com/?q=Friendship+Circle+Israel",verified:true,full:"Friendship Circle יוצר חברויות בין ילדים עם צרכים מיוחדים למתנדבי נוער. 5,000 ילדים ו-11,000 מתנדבים."},
];

// ══════════════════════════════════════
// STATE
// ══════════════════════════════════════
let S={cat:"all",q:"",tab:"home",saved:new Set(JSON.parse(localStorage.getItem("kanafayim_saved")||"[]")),modal:null,toast:null,tid:null};

// ══════════════════════════════════════
// HELPERS
// ══════════════════════════════════════
function el(tag,a={},html=""){const e=document.createElement(tag);for(const[k,v]of Object.entries(a))e.setAttribute(k,v);if(html)e.innerHTML=html;return e;}
function catOf(id){return CATS.find(c=>c.id===id)||CATS[0];}
function shown(){return SVC.filter(s=>{if(S.cat!=="all"&&s.cat!==S.cat)return false;if(S.q){const q=S.q;return[s.nm,s.org,s.desc,...s.tags].some(t=>t.includes(q));}return true;});}
function saveFavs(){localStorage.setItem("kanafayim_saved",JSON.stringify([...S.saved]));}
function toast(msg,em="✅"){if(S.tid)clearTimeout(S.tid);S.toast={msg,em};render();S.tid=setTimeout(()=>{S.toast=null;render();},2500);}
function toggleSave(id){if(S.saved.has(id)){S.saved.delete(id);toast("הוסר מהשמורים","💔");}else{S.saved.add(id);toast("נשמר!","⭐");}saveFavs();render();}

// ══════════════════════════════════════
// RENDER
// ══════════════════════════════════════
function render(){
  const root=document.getElementById("root");
  root.innerHTML="";
  if(S.toast)root.appendChild(el("div",{class:"toast"},`<span style="font-size:20px">${S.toast.em}</span> ${S.toast.msg}`));
  if(S.modal)root.appendChild(mkModal(S.modal));
  root.appendChild(mkHeader());
  if(S.tab==="home")root.appendChild(mkHero());
  root.appendChild(mkFilters());
  const main=el("div",{class:"main"});
  if(S.tab==="home")mkHome(main);
  else if(S.tab==="saved")mkSaved(main);
  else mkAbout(main);
  root.appendChild(main);
  root.appendChild(mkBnav());
}

function mkHeader(){
  const h=el("header",{class:"hdr"});
  const r=el("div",{class:"hdr-row"});
  const logo=el("div",{class:"logo-wrap"});
  logo.innerHTML=`<div class="logo-box">💙</div><div class="logo-txt"><div class="t1">כנפיים</div><div class="t2">מדריך צרכים מיוחדים</div></div>`;
  logo.onclick=()=>{S.tab="home";S.q="";render();window.scrollTo(0,0);};
  const sw=el("div",{class:"srch-wrap"});
  const si=el("input",{type:"text",placeholder:"חפש טיפול, ארגון, מוגבלות...",value:S.q});
  si.oninput=e=>{S.q=e.target.value;S.tab="home";render();};
  sw.appendChild(si);sw.innerHTML+=`<span class="srch-ico">🔍</span>`;sw.insertBefore(si,sw.firstChild);
  const st=el("div",{class:"hdr-stats"});
  st.innerHTML=`<div class="hdr-stat"><span>${SVC.length}+</span>שירותים</div>`;
  r.appendChild(logo);r.appendChild(sw);r.appendChild(st);h.appendChild(r);return h;
}

function mkHero(){
  const h=el("div",{class:"hero"});
  h.innerHTML=`<div class="hero-in"><h1>מוצאים <b>את הדרך הנכונה</b><br>לכל ילד וכל משפחה</h1><p>מדריך מקיף לשירותים לאנשים עם צרכים מיוחדים – בישראל ובעולם. כולל מפות, וואטסאפ ופרטי קשר ישירים.</p><div class="hero-nums"><div class="hnum"><div class="n">${SVC.length}+</div><div class="l">שירותים</div></div><div class="hnum"><div class="n">${CATS.length-1}</div><div class="l">קטגוריות</div></div><div class="hnum"><div class="n">🗺️</div><div class="l">מפות</div></div><div class="hnum"><div class="n">💬</div><div class="l">וואטסאפ</div></div></div></div>`;
  return h;
}

function mkFilters(){
  const fb=el("div",{class:"fbar"});const fi=el("div",{class:"fbar-in"});
  CATS.forEach(c=>{const b=el("button",{class:"fcat"+(S.cat===c.id?" on":"")});b.innerHTML=`<span class="ce">${c.em}</span>${c.lbl}`;if(S.cat===c.id)b.style.background=c.col;b.onclick=()=>{S.cat=c.id;S.tab="home";render();window.scrollTo(0,0);};fi.appendChild(b);});
  fb.appendChild(fi);return fb;
}

function mkHome(main){
  const bn=el("div",{class:"banner"});bn.innerHTML=`<div class="bi">💡</div><div class="bt"><b>טיפ חשוב להורים</b>התחלה מוקדמת של טיפולים (לפני גיל 3) מביאה לתוצאות טובות הרבה יותר.</div>`;main.appendChild(bn);
  const list=shown();
  const ttl=el("div",{class:"sec-ttl"});ttl.innerHTML=`<span class="si">${catOf(S.cat).em}</span>${catOf(S.cat).lbl==="הכל"?"כל השירותים":catOf(S.cat).lbl} <span class="count-badge">${list.length}</span>`;main.appendChild(ttl);
  if(!list.length){main.appendChild(el("div",{class:"empty"},`<div class="ee">🔍</div><p>לא נמצאו שירותים</p>`));return;}
  const grid=el("div",{class:"grid"});list.forEach((s,i)=>grid.appendChild(mkCard(s,i)));main.appendChild(grid);
}

function mkSaved(main){
  const list=SVC.filter(s=>S.saved.has(s.id));
  const ttl=el("div",{class:"sec-ttl"});ttl.innerHTML=`<span class="si">⭐</span>שמורים <span class="count-badge">${list.length}</span>`;main.appendChild(ttl);
  if(!list.length){main.appendChild(el("div",{class:"empty"},`<div class="ee">⭐</div><p>לא שמרת שירותים עדיין</p>`));return;}
  const grid=el("div",{class:"grid"});list.forEach((s,i)=>grid.appendChild(mkCard(s,i)));main.appendChild(grid);
}

function mkCard(s,i){
  const c=el("div",{class:"card"});c.style.animationDelay=(i*.04)+"s";
  const saved=S.saved.has(s.id);
  c.innerHTML=`<div class="card-top-bar" style="background:linear-gradient(90deg,${s.col},${s.col}88);"></div><div class="card-body"><div class="card-head"><div class="card-icon" style="background:${s.col}18;border:2px solid ${s.col}33;">${s.em}</div><div class="card-ti"><div class="cn">${s.nm}</div><div class="co">${s.org}</div>${s.verified?`<div class="vbadge">✓ מאומת</div>`:""}</div></div><div class="card-tags"><span class="tag tag-cat" style="background:${s.col};">${catOf(s.cat).em} ${catOf(s.cat).lbl}</span>${s.tags.slice(0,2).map(t=>`<span class="tag tag-plain">${t}</span>`).join("")}</div><div class="card-desc">${s.desc}</div><div class="card-loc">📍 ${s.loc}</div><div class="card-acts">${s.phone?`<button class="act-btn act-call" data-action="call" data-val="${s.phone}">📞 חייג</button>`:""}${s.wa?`<button class="act-btn act-wa" data-action="wa" data-val="${s.wa}">💬 וואטסאפ</button>`:""}${s.map?`<button class="act-btn act-map" data-action="map" data-val="${s.map}">🗺️ מפה</button>`:""}${s.web?`<button class="act-btn act-web" data-action="web" data-val="${s.web}">🔗 אתר</button>`:""}<button class="act-btn act-save${saved?" on":""}" data-action="save" data-val="${s.id}">${saved?"⭐":"☆"}</button></div></div>`;
  c.addEventListener("click",e=>{const btn=e.target.closest("button[data-action]");if(btn){const{action,val}=btn.dataset;if(action==="call"){window.open("tel:"+val);return;}if(action==="wa"){window.open("https://wa.me/"+val);return;}if(action==="map"){window.open(val,"_blank");return;}if(action==="web"){window.open(val,"_blank");return;}if(action==="save"){toggleSave(parseInt(val));return;}}S.modal=s;render();});
  return c;
}

function mkModal(s){
  const ov=el("div",{class:"ov"});const m=el("div",{class:"modal"});const saved=S.saved.has(s.id);
  m.innerHTML=`<div class="modal-bar" style="background:linear-gradient(90deg,${s.col},${s.col}88);"></div><div class="modal-in"><div class="m-handle"></div><div class="m-head"><div class="m-icon" style="background:${s.col}18;border:2px solid ${s.col}44;">${s.em}</div><div><div class="m-title">${s.nm}</div><div class="m-sub">${s.org}${s.verified?' <span style="color:#059669;font-size:12px;">✓ מאומת</span>':""}</div><div class="card-tags" style="margin-top:6px;"><span class="tag tag-cat" style="background:${s.col};">${catOf(s.cat).em} ${catOf(s.cat).lbl}</span>${s.tags.map(t=>`<span class="tag tag-plain">${t}</span>`).join("")}</div></div></div><div class="m-sec"><h3>על השירות</h3><p>${s.full}</p></div><div class="m-sec"><h3>פרטי קשר ומיקום</h3><div class="info-row"><span class="ii">📍</span>${s.loc}</div>${s.phone?`<div class="info-row"><span class="ii">📞</span><a href="tel:${s.phone}" style="color:var(--blue);font-weight:700;">${s.phone}</a></div>`:""}${s.wa?`<div class="info-row"><span class="ii">💬</span><a href="https://wa.me/${s.wa}" target="_blank" style="color:#25D366;font-weight:700;">וואטסאפ ישיר</a></div>`:""}${s.web?`<div class="info-row"><span class="ii">🔗</span><a href="${s.web}" target="_blank" style="color:var(--blue);">${s.web.replace("https://","")}</a></div>`:""}</div></div>`;
  const acts=el("div",{class:"m-acts"});
  if(s.phone){const b=el("button",{class:"m-btn mb-primary"});b.innerHTML="📞 התקשר";b.onclick=()=>window.open("tel:"+s.phone);acts.appendChild(b);}
  if(s.wa){const b=el("button",{class:"m-btn mb-wa"});b.innerHTML="💬 וואטסאפ";b.onclick=()=>window.open("https://wa.me/"+s.wa);acts.appendChild(b);}
  if(s.map){const b=el("button",{class:"m-btn mb-map"});b.innerHTML="🗺️ מפה";b.onclick=()=>window.open(s.map,"_blank");acts.appendChild(b);}
  if(s.web){const b=el("button",{class:"m-btn mb-sec"});b.innerHTML="🔗 אתר";b.onclick=()=>window.open(s.web,"_blank");acts.appendChild(b);}
  const sv=el("button",{class:"m-btn mb-sec"});sv.innerHTML=saved?"⭐ שמור":"☆ שמור";sv.onclick=()=>{toggleSave(s.id);S.modal={...s};render();};acts.appendChild(sv);
  m.appendChild(acts);ov.onclick=e=>{if(e.target===ov){S.modal=null;render();}};ov.appendChild(m);return ov;
}

function mkAbout(main){
  main.innerHTML=`<div class="about-card"><div style="text-align:center;margin-bottom:14px;"><div style="font-size:52px;">💙</div><h2 style="font-size:24px;font-weight:900;margin:8px 0 4px;">כנפיים</h2><p style="color:var(--muted);font-size:14px;line-height:1.65;">מדריך מקיף לשירותים לאנשים עם צרכים מיוחדים.<br>נבנה מתוך אהבה ורצון לעזור לכל משפחה.</p></div></div><div class="about-card"><h3>📋 מה כולל המדריך?</h3>${["🧠 טיפולים: OT, ST, PT, ABA, פסיכולוגיה, הידרותרפיה","🎵 טיפול יצירתי: מוזיקה, אמנות, תנועה, דרמה","🌀 ויסות חושי: SI, סנוזלן, לחץ עמוק","🦷 שיניים מיוחדות – הרדמה כללית","🐴 בעלי חיים: רכיבה, דולפינים, כלבים","📚 חינוך מיוחד ומסגרות שיקום","🤝 ארגונים: עלות, עקים, יד שרה","⚽ פנאי: ספורט, טבע, חברות"].map(i=>`<div class="about-item"><span>${i}</span></div>`).join("")}</div><div class="about-card" style="background:linear-gradient(135deg,#EFF6FF,#DBEAFE);border-color:#BFDBFE;"><h3 style="color:#1E3A8A;">⚡ קווי חירום</h3>${[["101","מגן דוד אדום"],["105","ביטוח לאומי – נכויות"],["*2407","משרד הבריאות"],["1-800-20-23-23","זכויות חולה"],["055-9993311","Caregivers – הורים"]].map(([n,l])=>`<div class="emer-row"><span style="font-weight:700;">${l}</span><a href="tel:${n}" class="emer-btn">${n}</a></div>`).join("")}</div><div style="text-align:center;color:#94A3B8;font-size:12px;padding:10px 0 30px;">המידע עודכן 2025</div>`;
}

function mkBnav(){
  const n=el("nav",{class:"bnav"});
  [{id:"home",em:"🏠",lbl:"בית"},{id:"saved",em:"⭐",lbl:"שמורים"},{id:"about",em:"ℹ️",lbl:"אודות"}].forEach(b=>{
    const btn=el("button",{class:"nb"+(S.tab===b.id?" on":"")});
    btn.innerHTML=`<span class="ni">${b.em}</span><span class="nl">${b.lbl}</span>${S.tab===b.id?`<div class="nb-dot"></div>`:""}`;
    btn.onclick=()=>{S.tab=b.id;render();window.scrollTo(0,0);};
    n.appendChild(btn);
  });
  return n;
}

// ══════════════════════════════════════
// PWA: Service Worker + Install prompt
// ══════════════════════════════════════
let deferredPrompt=null;

if("serviceWorker" in navigator){
  window.addEventListener("load",()=>{
    navigator.serviceWorker.register("./sw.js")
      .then(reg=>console.log("[PWA] SW registered:",reg.scope))
      .catch(err=>console.warn("[PWA] SW failed:",err));
  });
}

window.addEventListener("beforeinstallprompt",e=>{
  e.preventDefault();
  deferredPrompt=e;
  const banner=document.getElementById("install-banner");
  if(banner)banner.style.display="flex";
});

window.addEventListener("appinstalled",()=>{
  const banner=document.getElementById("install-banner");
  if(banner)banner.style.display="none";
  toast("האפליקציה הותקנה! 🎉","💙");
});

document.getElementById("install-btn")?.addEventListener("click",async()=>{
  if(!deferredPrompt)return;
  deferredPrompt.prompt();
  const{outcome}=await deferredPrompt.userChoice;
  deferredPrompt=null;
  if(outcome==="accepted")toast("מותקן! 🎉","💙");
});

// Handle URL params for shortcuts
const urlCat=new URLSearchParams(location.search).get("cat");
if(urlCat&&CATS.find(c=>c.id===urlCat))S.cat=urlCat;

render();
</script>
